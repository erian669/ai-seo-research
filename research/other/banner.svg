<svg width="1360" height="680" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
<title>AI SEO GEO digital tools banner</title>
<desc>Abstract banner showing the convergence of AI, SEO, and GEO through interconnected nodes, grid lines, and signal paths.</desc>

<!-- background -->
<rect width="680" height="340" fill="#0a0e1a"/>

<!-- subtle grid -->
<g stroke="#1a2240" stroke-width="0.5">
  <line x1="0" y1="40" x2="680" y2="40"/>
  <line x1="0" y1="80" x2="680" y2="80"/>
  <line x1="0" y1="120" x2="680" y2="120"/>
  <line x1="0" y1="160" x2="680" y2="160"/>
  <line x1="0" y1="200" x2="680" y2="200"/>
  <line x1="0" y1="240" x2="680" y2="240"/>
  <line x1="0" y1="280" x2="680" y2="280"/>
  <line x1="68" y1="0" x2="68" y2="340"/>
  <line x1="136" y1="0" x2="136" y2="340"/>
  <line x1="204" y1="0" x2="204" y2="340"/>
  <line x1="272" y1="0" x2="272" y2="340"/>
  <line x1="340" y1="0" x2="340" y2="340"/>
  <line x1="408" y1="0" x2="408" y2="340"/>
  <line x1="476" y1="0" x2="476" y2="340"/>
  <line x1="544" y1="0" x2="544" y2="340"/>
  <line x1="612" y1="0" x2="612" y2="340"/>
</g>

<!-- connector lines -->
<g stroke="#2563eb" stroke-width="1" fill="none" opacity="0.5">
  <line x1="120" y1="100" x2="260" y2="170"/>
  <line x1="260" y1="170" x2="420" y2="130"/>
  <line x1="420" y1="130" x2="560" y2="200"/>
  <line x1="120" y1="100" x2="420" y2="130"/>
  <line x1="260" y1="170" x2="560" y2="200"/>
  <line x1="120" y1="100" x2="200" y2="240"/>
  <line x1="200" y1="240" x2="380" y2="270"/>
  <line x1="380" y1="270" x2="560" y2="200"/>
  <line x1="420" y1="130" x2="500" y2="260"/>
  <line x1="500" y1="260" x2="380" y2="270"/>
</g>

<!-- signal pulses -->
<g stroke="#6366f1" stroke-width="0.8" stroke-dasharray="4 6" fill="none" opacity="0.6">
  <line x1="0" y1="155" x2="680" y2="155"/>
  <line x1="0" y1="195" x2="680" y2="195"/>
</g>

<!-- secondary nodes -->
<g fill="#1e3a6e" stroke="#2563eb" stroke-width="0.8">
  <circle cx="200" cy="240" r="5"/>
  <circle cx="380" cy="270" r="5"/>
  <circle cx="500" cy="260" r="5"/>
  <circle cx="160" cy="180" r="4"/>
  <circle cx="320" cy="90" r="4"/>
  <circle cx="470" cy="210" r="4"/>
  <circle cx="600" cy="130" r="4"/>
  <circle cx="80" cy="220" r="4"/>
  <circle cx="620" cy="270" r="4"/>
</g>

<!-- AI node -->
<circle cx="120" cy="100" r="34" fill="#0f1e3d" stroke="#3b82f6" stroke-width="1.5"/>
<text x="120" y="96" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#60a5fa">AI</text>
<text x="120" y="112" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#93c5fd">SEARCH</text>

<!-- SEO node -->
<circle cx="260" cy="170" r="34" fill="#0f1e3d" stroke="#6366f1" stroke-width="1.5"/>
<text x="260" y="166" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#a5b4fc">SEO</text>
<text x="260" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#c7d2fe">RANKINGS</text>

<!-- GEO node -->
<circle cx="420" cy="130" r="42" fill="#0f1e3d" stroke="#22d3ee" stroke-width="2"/>
<text x="420" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#67e8f9">GEO</text>
<text x="420" y="143" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#a5f3fc">GENERATIVE</text>

<!-- Digital Tools node -->
<circle cx="560" cy="200" r="34" fill="#0f1e3d" stroke="#10b981" stroke-width="1.5"/>
<text x="560" y="196" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#6ee7b7">DIGITAL</text>
<text x="560" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#6ee7b7">TOOLS</text>

<!-- keyword tags -->
<g font-family="system-ui,sans-serif" font-size="9" fill="none">
  <rect x="30" y="38" width="76" height="16" rx="3" fill="#0f1e3d" stroke="#2563eb" stroke-width="0.6"/>
  <text x="68" y="50" text-anchor="middle" fill="#93c5fd">LLM retrieval</text>

  <rect x="560" y="38" width="68" height="16" rx="3" fill="#0f1e3d" stroke="#6366f1" stroke-width="0.6"/>
  <text x="594" y="50" text-anchor="middle" fill="#a5b4fc">intent signals</text>

  <rect x="30" y="280" width="70" height="16" rx="3" fill="#0f1e3d" stroke="#10b981" stroke-width="0.6"/>
  <text x="65" y="292" text-anchor="middle" fill="#6ee7b7">structured data</text>

  <rect x="590" y="300" width="58" height="16" rx="3" fill="#0f1e3d" stroke="#22d3ee" stroke-width="0.6"/>
  <text x="619" y="312" text-anchor="middle" fill="#67e8f9">brand citations</text>

  <rect x="280" y="300" width="50" height="16" rx="3" fill="#0f1e3d" stroke="#6366f1" stroke-width="0.6"/>
  <text x="305" y="312" text-anchor="middle" fill="#c7d2fe">passages</text>

  <rect x="156" y="298" width="56" height="16" rx="3" fill="#0f1e3d" stroke="#3b82f6" stroke-width="0.6"/>
  <text x="184" y="310" text-anchor="middle" fill="#93c5fd">chunking</text>

  <rect x="450" y="298" width="56" height="16" rx="3" fill="#0f1e3d" stroke="#10b981" stroke-width="0.6"/>
  <text x="478" y="310" text-anchor="middle" fill="#6ee7b7">freshness</text>
</g>

<!-- bottom strip -->
<rect x="0" y="322" width="680" height="18" fill="#060912"/>
<text x="340" y="334" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#334155" letter-spacing="3">AI SEO RESEARCH — GEO — GENERATIVE ENGINE OPTIMIZATION</text>
</svg>
